<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" fill="none">
  <defs>
    <linearGradient id="bg" x1="450" y1="0" x2="450" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fa"/>
    </linearGradient>
    <radialGradient id="glow" cx="450" cy="85" r="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-glow" x1="150" y1="0" x2="750" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d97706" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#d97706" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#d97706" stop-opacity="0.7"/>
      <stop offset="0.75" stop-color="#d97706" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-dim" x1="200" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d97706" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="0.7" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#d0d7de" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" fill="url(#bg)"/>
  <rect width="900" height="250" fill="url(#dots)"/>
  <rect width="900" height="250" fill="url(#glow)"/>

  <!-- Top accent lines -->
  <line x1="180" y1="48" x2="720" y2="48" stroke="url(#line-glow)" stroke-width="0.8"/>
  <line x1="220" y1="52" x2="680" y2="52" stroke="url(#line-dim)" stroke-width="0.4"/>

  <!-- Connection nodes -->
  <circle cx="270" cy="38" r="2.5" fill="#d97706" opacity="0.4"/>
  <circle cx="450" cy="28" r="2.5" fill="#d97706" opacity="0.4"/>
  <circle cx="630" cy="38" r="2.5" fill="#d97706" opacity="0.4"/>

  <!-- Connection lines from eye to nodes -->
  <line x1="432" y1="72" x2="272" y2="40" stroke="#d97706" stroke-width="0.4" opacity="0.15"/>
  <line x1="450" y1="68" x2="450" y2="30" stroke="#d97706" stroke-width="0.4" opacity="0.15"/>
  <line x1="468" y1="72" x2="628" y2="40" stroke="#d97706" stroke-width="0.4" opacity="0.15"/>

  <!-- Eye symbol -->
  <path d="M 412 80 Q 450 52 488 80 Q 450 108 412 80 Z" stroke="#b45309" stroke-width="1.5" fill="none" opacity="0.55"/>
  <circle cx="450" cy="80" r="6" fill="#d97706" opacity="0.8"/>
  <circle cx="450" cy="80" r="14" fill="#d97706" opacity="0.05"/>

  <!-- Title -->
  <text x="450" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="6">EYE OF GOD</text>

  <!-- Tagline -->
  <text x="450" y="172" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#656d76">Your Claude Code instances can't see each other.</text>
  <text x="450" y="194" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#b45309">Now they can.</text>

  <!-- Bottom accent lines -->
  <line x1="220" y1="218" x2="680" y2="218" stroke="url(#line-dim)" stroke-width="0.4"/>
  <line x1="180" y1="222" x2="720" y2="222" stroke="url(#line-glow)" stroke-width="0.8"/>
</svg>
