name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Start broker
        run: |
          bun broker.ts &
          # Wait for broker to be ready
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:7899/health >/dev/null 2>&1; then
              echo "Broker ready"
              break
            fi
            sleep 0.2
          done

      - name: Run E2E tests
        run: bash test-e2e.sh

      - name: Verify plugin builds
        run: bash build-plugin.sh

      - name: Verify plugin structure
        run: |
          echo "Checking required plugin files..."
          for f in \
            plugin/.claude-plugin/plugin.json \
            plugin/.claude-plugin/CLAUDE.md \
            plugin/.mcp.json \
            plugin/hooks/hooks.json \
            plugin/scripts/smart-install.sh \
            plugin/scripts/ensure-broker.sh \
            plugin/broker.ts \
            plugin/server.ts \
            plugin/shared/types.ts \
            plugin/shared/summarize.ts \
            plugin/package.json \
            .claude-plugin/marketplace.json; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "  OK: $f"
          done
          echo "All plugin files present"
